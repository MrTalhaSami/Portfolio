name: Trigger Automation on Deploy Success

on:
  deployment_status:

jobs:
  trigger:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to automation repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.AUTOMATION_TRIGGER_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/MrTalhaSami/ci-cd-pipelines/dispatches \
            -d '{"event_type":"django-updated","client_payload":{"deploy_url":"${{ github.event.deployment_status.target_url }}"}}'