{% extends 'base.html' %}

{% block title %}| Contact {% endblock title %}

{% block body %}
  <div class="container">
    <h1 class="mt-5">Contact Me</h1>
    <form action="" class="mt-5 " method="post">
      {% csrf_token %}
      <div class="input-group mb-3">
        <span class="input-group-text" id="visible-addon"><i class="bi bi-form bi-person-fill"></i></span>
        <input type="text" class="form-control" name="fName" placeholder="first name" aria-label="Username" aria-describedby="visible-addon" />
        <input type="text" class="form-control d-none" placeholder="Hidden input" aria-label="Hidden input" aria-describedby="visible-addon" />
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="visible-addon">@</span>
        <input type="text" class="form-control" name="lName" placeholder="last name" aria-label="Username" aria-describedby="visible-addon" />
        <input type="text" class="form-control d-none" placeholder="Hidden input" aria-label="Hidden input" aria-describedby="visible-addon" />
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="visible-addon"><i class="bi bi-123 bi-form"></i></span>
        <input type="number" class="form-control" name="num" placeholder="number" aria-label="Username" aria-describedby="visible-addon" />
        <input type="number" class="form-control d-none" placeholder="Hidden input" aria-label="Hidden input" aria-describedby="visible-addon" />
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="visible-addon"><i class="bi bi-envelope-fill bi-form"></i></span>
        <input type="text" class="form-control" name="email" placeholder="email" aria-label="Username" aria-describedby="visible-addon" />
        <input type="text" class="form-control d-none" placeholder="Hidden input" aria-label="Hidden input" aria-describedby="visible-addon" />
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="visible-addon"><i class="bi bi-chat-dots-fill bi-form"></i></span>
        <input type="text" class="form-control" name="message" placeholder="Enter your message" aria-label="Username" aria-describedby="visible-addon" />
        <input type="text" class="form-control d-none" placeholder="Hidden input" aria-label="Hidden input" aria-describedby="visible-addon" />
      </div>

      <div class="input-group mb-3 w-25">
        <span class="input-group-text" id="visible-addon">@</span>
        <input type="date" class="form-control" name="date" placeholder="Enter Date" aria-label="Username" aria-describedby="visible-addon" />
        <input type="date" class="form-control d-none" placeholder="Hidden input" aria-label="Hidden input" aria-describedby="visible-addon" />
      </div>

      <div class="">
        <button class="btn btn-form-submit bg-color-2 w-25" type="submit">Send</button>
      </div>
    </form>
  </div>
{% endblock %}
