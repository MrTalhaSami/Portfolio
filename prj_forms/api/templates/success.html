{% extends 'base.html' %}
{% load static %}

{% block title %}| Thank You{% endblock %}

{% block body %}
<section class="d-flex align-items-center justify-content-center" style="min-height: 55vh;">
  <div class="container text-center fade-up thank-you-wrap" style="max-width: 480px;">
    <div class="thank-you-check"><i class="bi bi-check-lg"></i></div>
    <h1 class="fw-bold mb-3">Message Sent!</h1>
    <p class="portfolio-desc">Thanks for reaching out — I'll get back to you as soon as possible.</p>
    <a href="{% url 'landing' %}" class="btn btn-solid-cyan px-4 py-2 mt-3">Back to Home</a>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var el = document.querySelector('.thank-you-wrap');
    setTimeout(function () {
      el.classList.add('show');
    }, 150);
  });
</script>
{% endblock %}
